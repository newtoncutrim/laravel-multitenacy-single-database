global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345
