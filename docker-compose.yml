services:
    app:
        image: laravel-multitenancy-single-database-app
        build:
            context: .
            dockerfile: Dockerfile
            args:
                user: ${DOCKER_USER:-appuser}
                uid: ${DOCKER_UID:-1000}
        restart: unless-stopped
        working_dir: /var/www/
        volumes:
            - ./:/var/www
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            APP_URL: ${APP_URL:-http://localhost:8989}
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE:-laravel}
            DB_USERNAME: ${DB_USERNAME:-laravel}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            REDIS_HOST: redis
            QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
            RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
            RABBITMQ_PORT: 5672
            RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-laravel}
            RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-secret}
            RABBITMQ_VHOST: ${RABBITMQ_DEFAULT_VHOST:-laravel}
            XDEBUG_MODE: ${XDEBUG_MODE:-debug,develop}
            XDEBUG_START_WITH_REQUEST: ${XDEBUG_START_WITH_REQUEST:-yes}
            XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST:-host.docker.internal}
            XDEBUG_CLIENT_PORT: ${XDEBUG_CLIENT_PORT:-9003}
            XDEBUG_IDEKEY: ${XDEBUG_IDEKEY:-VSCODE}
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - laravel

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "8989:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/:/etc/nginx/conf.d/
        depends_on:
            - app
        networks:
            - laravel

    frontend:
        image: node:20-alpine
        restart: unless-stopped
        working_dir: /var/www/frontend
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
        ports:
            - "5173:5173"
        volumes:
            - ./frontend:/var/www/frontend
            - frontend_node_modules:/var/www/frontend/node_modules
        environment:
            VITE_PROXY_API_TARGET: ${FRONTEND_PROXY_API_TARGET:-http://nginx}
        depends_on:
            - nginx
        networks:
            - laravel

    db:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-laravel}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_USER: ${DB_USERNAME:-laravel}
        volumes:
            - ./.docker/mysql/dbdata:/var/lib/mysql
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - laravel

    queue:
        image: laravel-multitenancy-single-database-app
        build:
            context: .
            dockerfile: Dockerfile
            args:
                user: ${DOCKER_USER:-appuser}
                uid: ${DOCKER_UID:-1000}
        restart: unless-stopped
        command: "php artisan queue:work --tries=3 --sleep=3"
        working_dir: /var/www/
        volumes:
            - ./:/var/www
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            APP_URL: ${APP_URL:-http://localhost:8989}
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE:-laravel}
            DB_USERNAME: ${DB_USERNAME:-laravel}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            REDIS_HOST: redis
            QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
            RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
            RABBITMQ_PORT: 5672
            RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-laravel}
            RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-secret}
            RABBITMQ_VHOST: ${RABBITMQ_DEFAULT_VHOST:-laravel}
            XDEBUG_MODE: ${XDEBUG_MODE:-debug,develop}
            XDEBUG_START_WITH_REQUEST: ${XDEBUG_START_WITH_REQUEST:-yes}
            XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST:-host.docker.internal}
            XDEBUG_CLIENT_PORT: ${XDEBUG_CLIENT_PORT:-9003}
            XDEBUG_IDEKEY: ${XDEBUG_IDEKEY:-VSCODE}
        depends_on:
            app:
                condition: service_started
            db:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - laravel

    redis:
        image: redis:latest
        networks:
            - laravel

    rabbitmq:
        image: rabbitmq:4-management
        restart: unless-stopped
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-laravel}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-secret}
            RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-laravel}
        ports:
            - "${RABBITMQ_AMQP_PORT:-5672}:5672"
            - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
            - "${RABBITMQ_PROMETHEUS_PORT:-15692}:15692"
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
            - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - laravel

    prometheus:
        image: prom/prometheus:latest
        restart: unless-stopped
        profiles:
            - observability
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.enable-lifecycle"
        ports:
            - "${PROMETHEUS_PORT:-9090}:9090"
        volumes:
            - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        depends_on:
            rabbitmq:
                condition: service_healthy
            cadvisor:
                condition: service_started
            alloy:
                condition: service_started
        networks:
            - laravel

    grafana:
        image: grafana/grafana:latest
        restart: unless-stopped
        profiles:
            - observability
        environment:
            GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
            GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
        ports:
            - "${GRAFANA_PORT:-3000}:3000"
        volumes:
            - grafana_data:/var/lib/grafana
            - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
        depends_on:
            prometheus:
                condition: service_started
            loki:
                condition: service_started
        networks:
            - laravel

    loki:
        image: grafana/loki:latest
        restart: unless-stopped
        profiles:
            - observability
        command: "-config.file=/etc/loki/loki-config.yml"
        ports:
            - "${LOKI_PORT:-3100}:3100"
        volumes:
            - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
            - loki_data:/loki
        networks:
            - laravel

    alloy:
        image: grafana/alloy:latest
        restart: unless-stopped
        profiles:
            - observability
        command:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
        ports:
            - "${ALLOY_PORT:-12345}:12345"
        volumes:
            - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
            - alloy_data:/var/lib/alloy/data
            - /var/run/docker.sock:/var/run/docker.sock:ro
        depends_on:
            loki:
                condition: service_started
        networks:
            - laravel

    cadvisor:
        image: ghcr.io/google/cadvisor:latest
        restart: unless-stopped
        profiles:
            - observability
        ports:
            - "${CADVISOR_PORT:-8080}:8080"
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk/:/dev/disk:ro
        privileged: true
        devices:
            - /dev/kmsg
        networks:
            - laravel

networks:
    laravel:
        driver: bridge

volumes:
    rabbitmq_data:
    prometheus_data:
    grafana_data:
    loki_data:
    alloy_data:
    frontend_node_modules:
