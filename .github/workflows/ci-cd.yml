name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  build:
    name: Build da aplicacao
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, ctype, fileinfo, gd, mbstring, openssl, pdo_mysql, sockets, tokenizer, xml, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --no-interaction --prefer-dist --optimize-autoloader

      - name: Install frontend dependencies
        run: |
          cd frontend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Validate Laravel bootstrap
        run: php artisan config:cache

  tests:
    name: Testes automatizados
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_PASSWORD: secret
          MYSQL_USER: laravel
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laravel_test
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      CACHE_DRIVER: array
      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, ctype, fileinfo, gd, mbstring, openssl, pdo_mysql, sockets, tokenizer, xml, zip
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --no-interaction --prefer-dist

      - name: Prepare application
        run: cp .env.example .env

      - name: Run tests
        run: php artisan test

  code-quality:
    name: Qualidade de codigo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, ctype, fileinfo, gd, mbstring, openssl, pdo_mysql, sockets, tokenizer, xml, zip
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --no-interaction --prefer-dist

      - name: Validate Composer files
        run: composer validate --strict --no-check-publish

      - name: Audit Composer dependencies
        run: composer audit --no-interaction

      - name: Check PHP code style
        run: ./vendor/bin/pint --test app config database routes tests

      - name: Run static analysis
        run: |
          mkdir -p storage/framework/phpstan
          ./vendor/bin/phpstan analyse --memory-limit=1G

      - name: Check PHP-CS-Fixer rules
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Check frontend types
        run: cd frontend && npm run lint
